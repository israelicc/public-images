name: Build and Push Analytics DB Orchestration OpenCode Image
# force rebuild
on:
  push:
    branches: [main]
    paths:
      - 'images/analytics-db-orchestration-opencode/**'
      - '.github/workflows/build-analytics-db-orchestration-opencode.yml'
  pull_request:
    branches: [main]
    paths:
      - 'images/analytics-db-orchestration-opencode/**'
      - '.github/workflows/build-analytics-db-orchestration-opencode.yml'
  release:
    types: [published]
  schedule:
    - cron: '0 2 1 * *'  # Monthly on 1st

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/analytics-db-orchestration-opencode

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'DD-MM-YYYY'}}
            type=schedule,pattern={{date 'YYYY.MM.DD'}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./images/analytics-db-orchestration-opencode
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract package versions
        run: |
          echo "## 🔄 Analytics DB Orchestration OpenCode Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Features" >> $GITHUB_STEP_SUMMARY
          echo "- Inherits from analytics-db-orchestration base image" >> $GITHUB_STEP_SUMMARY
          echo "- Adds OpenCode integration" >> $GITHUB_STEP_SUMMARY
          echo "- Full Dagster orchestration capabilities" >> $GITHUB_STEP_SUMMARY
          echo "- Multi-platform support (AMD64/ARM64)" >> $GITHUB_STEP_SUMMARY
