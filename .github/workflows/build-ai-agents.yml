name: Build and Push AI Agents Image

on:
  push:
    branches: [main]
    paths:
      - 'images/ai-agents/**'
      - '.github/workflows/build-ai-agents.yml'
  pull_request:
    branches: [main]
    paths:
      - 'images/ai-agents/**'
      - '.github/workflows/build-ai-agents.yml'
  release:
    types: [published]
  schedule:
    - cron: '0 0 1 * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-agents

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'DD-MM-YYYY'}}
            type=schedule,pattern={{date 'YYYY.MM.DD'}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./images/ai-agents
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract package versions
        run: |
          echo "## 🤖 AI Agents Image Package Versions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat images/ai-agents/requirements.in >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Detect package changes
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Package Changes" >> $GITHUB_STEP_SUMMARY
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV_FILE=$(git show HEAD^:images/ai-agents/requirements.in 2>/dev/null || echo "")
            if [ -n "$PREV_FILE" ]; then
              echo '```diff' >> $GITHUB_STEP_SUMMARY
              diff --unified=3 <(echo "$PREV_FILE") images/ai-agents/requirements.in >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "_First commit - no previous version to compare_" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "_First commit - no previous version to compare_" >> $GITHUB_STEP_SUMMARY
          fi
        shell: bash
